<template>
    <section id="about" class="portfolio-about slds-p-around_medium slds-text-align_center">
        <h2 class="title">{title}</h2>
        <p class="desc">{description}</p>

        <div class="slds-grid slds-wrap slds-m-top_large cards">
            <template for:each={skillCategories} for:item="category">
                <div key={category} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_small">
                    <article class="skill-card">
                        <h3>{category}</h3>
                        <ul>
                            <!-- Skills will be populated here from related records -->
                        </ul>
                    </article>
                </div>
            </template>
        </div>
    </section>
</template>
