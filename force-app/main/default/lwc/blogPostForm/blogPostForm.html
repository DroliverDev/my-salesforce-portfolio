<template>
    <lightning-card title={cardTitle} icon-name="standard:article">
        <div class="slds-p-around_medium">
            <form onsubmit={handleSubmit}>
                <template if:true={isLoadingEdit}>
                    <lightning-spinner alternative-text="Loading post" size="small"></lightning-spinner>
                </template>

                <lightning-input
                    name="title"
                    label="Title"
                    value={formData.title}
                    onchange={handleTitleChange}
                    required>
                </lightning-input>

                <lightning-input
                    class="slds-m-top_small"
                    name="slug"
                    label="Slug"
                    value={formData.slug}
                    onchange={handleSlugChange}
                    required>
                </lightning-input>

                <lightning-input-rich-text
                    class="slds-m-top_small"
                    label="Content"
                    value={formData.content}
                    onchange={handleContentChange}
                    required>
                </lightning-input-rich-text>

                <lightning-combobox
                    class="slds-m-top_small"
                    name="status"
                    label="Status"
                    value={formData.status}
                    options={statusOptions}
                    onchange={handleStatusChange}>
                </lightning-combobox>

                <lightning-dual-listbox
                    class="slds-m-top_small"
                    name="tags"
                    label="Tags"
                    source-label="Available Tags"
                    selected-label="Selected Tags"
                    options={tagOptions}
                    value={selectedTagIds}
                    onchange={handleTagsChange}>
                </lightning-dual-listbox>

                <lightning-input
                    class="slds-m-top_small"
                    name="newTags"
                    label="Create New Tags"
                    value={newTagsInput}
                    placeholder="e.g. salesforce, lwc, apex"
                    message-when-too-long="Keep tag input under 255 characters."
                    maxlength="255"
                    onchange={handleNewTagsChange}>
                </lightning-input>

                <lightning-input
                    class="slds-m-top_small"
                    type="file"
                    label="Upload Image"
                    accept="image/*"
                    disabled={isUploadDisabled}
                    onchange={handleFileChange}>
                </lightning-input>

                <template if:true={isUploadingImage}>
                    <div class="slds-m-top_small slds-grid slds-grid_vertical-align-center">
                        <lightning-spinner alternative-text="Uploading image" size="small"></lightning-spinner>
                        <span class="slds-m-left_medium slds-text-color_weak">Uploading image...</span>
                    </div>
                </template>

                <template if:true={hasImagePreview}>
                    <div class="slds-m-top_small">
                        <p class="slds-text-title_caps slds-text-color_weak slds-m-bottom_xx-small">Image Preview</p>
                        <img src={imagePreviewUrl} alt="Blog post image" style="max-width:100%;max-height:300px;border-radius:4px;" />
                    </div>
                </template>

                <div class="slds-m-top_medium">
                    <lightning-button
                        variant="brand"
                        label={submitButtonLabel}
                        type="submit"
                        disabled={isSubmitDisabled}>
                    </lightning-button>
                </div>
            </form>
        </div>
    </lightning-card>
</template>
