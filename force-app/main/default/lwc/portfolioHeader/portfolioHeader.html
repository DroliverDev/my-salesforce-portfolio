<template>
    <section class="portfolio-header slds-p-around_medium">
        <div class="nav slds-grid slds-m-bottom_medium">
            <div class="slds-col">
                <button class="lang-toggle slds-button slds-button_neutral" aria-label="Language toggle: English and Portuguese">
                    <span class="lang-option">
                        <img src={englishFlagUrl} alt="English" class="lang-flag" />
                        <span>EN</span>
                    </span>
                    <span class="lang-separator">/</span>
                    <span class="lang-option">
                        <img src={portugueseFlagUrl} alt="Português" class="lang-flag" />
                        <span>PT</span>
                    </span>
                </button>
            </div>
            <div class="slds-col slds-align-end nav-links">
                <nav class="slds-p-horizontal_small">
                    <a href="#about" class="slds-m-right_small">Sobre</a>
                    <a href="#services" class="slds-m-right_small">Serviços</a>
                    <a href="#projects" class="slds-m-right_small">Portfólio</a>
                    <a href="#contact">Contato</a>
                </nav>
            </div>
        </div>

        <div class="slds-grid slds-wrap slds-align_absolute-center hero">
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 image-col">
                <div class="profile-image" role="img" aria-label="Profile image">
                    <img src={imageUrl} alt="Profile image" />
                </div>
            </div>

            <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-3 hero-body">
                <h1 class="name">{name}</h1>
                <p class="bio">{bio}</p>

                <div class="socials slds-m-vertical_small">
                    <a href={whatsappPhone} target="_blank" class="slds-m-left_x-small" title="Whatsapp">
                        <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
                    </a>
                    <a href={linkedinUrl} target="_blank" class="slds-m-left_x-small" title="LinkedIn">
                        <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
                    </a>
                    <a href={githubUrl} target="_blank" class="slds-m-left_x-small" title="GitHub">
                        <i class="fa-brands fa-github" aria-hidden="true"></i>
                    </a>
                    <a href={salesforceUrl} target="_blank" class="slds-m-left_x-small" title="Salesforce">
                        <i class="fa-brands fa-salesforce" aria-hidden="true"></i>
                    </a>
                </div>

                <!-- <div class="slds-m-top_medium">
                    <button class="contact-button slds-button" onclick={handleContactClick}>Fale Comigo</button>
                </div> -->
            </div>
        </div>
    </section>
</template>
