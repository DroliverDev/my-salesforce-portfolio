<template>
    <section id="contact" class="portfolio-contact slds-p-around_medium slds-text-align_center reveal-section">
        <div class="section-shell">
            <div class="heading-block">
                <p class="section-kicker">Contact</p>
                <h2>{title}</h2>
                <p class="heading-desc">{description}</p>
            </div>

            <div class="form-card slds-m-top_large">
                <form class="contact-form" onsubmit={handleSubmit}>
                    <lightning-input
                        name="name"
                        label="Name"
                        value={formData.name}
                        onchange={handleInputChange}
                        required>
                    </lightning-input>

                    <lightning-input
                        type="email"
                        name="email"
                        label="Email"
                        value={formData.email}
                        onchange={handleInputChange}
                        required>
                    </lightning-input>

                    <lightning-textarea
                        name="message"
                        label="Message"
                        value={formData.message}
                        onchange={handleInputChange}
                        required>
                    </lightning-textarea>

                    <div class="slds-m-top_medium actions-row">
                        <button type="submit" class="mailto-button" disabled={isSubmitting}>{submitLabel}</button>
                    </div>
                </form>

                <template if:true={feedbackMessage}>
                    <p class={feedbackClass}>{feedbackMessage}</p>
                </template>

                <div class="alt-contact slds-m-top_medium">
                    <a class="secondary-link" href={mailtoLink}>{buttonLabel}</a>
                </div>
            </div>
        </div>
    </section>
</template>
