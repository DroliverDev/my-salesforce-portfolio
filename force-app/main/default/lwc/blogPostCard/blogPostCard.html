<template>
    <article class="card" role="button" tabindex="0" onclick={handleSelect} onkeydown={handleKeyDown}>
        <img class="card-image" src={resolvedImageUrl} alt={post.title} loading="lazy" />

        <div class="slds-p-around_medium">
            <p class="slds-text-title_caps category">{post.category}</p>
            <h3 class="slds-text-heading_small slds-m-top_x-small">{post.title}</h3>
            <p class="slds-m-top_small description">{post.description}</p>

            <div class="slds-m-top_small slds-grid slds-wrap">
                <template for:each={visibleTags} for:item="tag">
                    <lightning-badge key={tag} class="slds-m-right_x-small slds-m-bottom_x-small" label={tag}></lightning-badge>
                </template>
            </div>
        </div>
    </article>
</template>
