<template>
    <template lwc:if={stylesLoaded}>
        <main class="portfolio-shell">
            <c-portfolio-header
                record-id={recordId}
                language={currentLanguage}
                labels={headerLabels}
                profile-image={profileImageUrl}
                onnavscroll={handleNavScroll}
                onlanguagechange={handleLanguageChange}>
            </c-portfolio-header>
            <c-portfolio-about
                record-id={recordId}
                title={aboutLabels.title}
                description={aboutLabels.description}>
            </c-portfolio-about>
            <c-portfolio-projects
                record-id={recordId}
                title={projectLabels.title}
                project-images={projectsBaseUrl}>
            </c-portfolio-projects>
            <c-portfolio-contact
                record-id={recordId}
                title={contactLabels.title}
                description={contactLabels.description}
                button-label={contactLabels.emailButton}
                email-subject={contactLabels.emailSubject}>
            </c-portfolio-contact>
        </main>
    </template>
</template>
