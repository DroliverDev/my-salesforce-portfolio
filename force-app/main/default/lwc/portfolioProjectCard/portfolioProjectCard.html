<template>
    <article class="project-card">
        <div class="image-placeholder">
            <template if:true={imageUrl}>
                <img src={imageUrl} alt={projectName} />
            </template>
            <template if:false={imageUrl}>
                <div class="placeholder"></div>
            </template>
        </div>

        <div class="card-body">
            <h3 class="card-title">{projectName}</h3>
            <p class="desc">{description}</p>
        </div>

        <div class="card-footer">
            <a class="code-button" href={codeUrl} target="_blank" rel="noopener noreferrer">View Code</a>
        </div>
    </article>
</template>
