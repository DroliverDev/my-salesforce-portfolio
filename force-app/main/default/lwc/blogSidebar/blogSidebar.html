<template>
    <section class={sidebarClass}>
        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
            <h2 class="slds-text-title_caps">Filters</h2>
            <lightning-button-icon
                icon-name={toggleIcon}
                variant="bare"
                alternative-text="Toggle filters"
                title="Toggle filters"
                onclick={handleToggle}>
            </lightning-button-icon>
        </div>

        <template if:false={isCollapsed}>
            <lightning-input
                class="slds-m-bottom_medium"
                type="search"
                label="Search"
                value={searchValue}
                placeholder="Search title or description"
                onchange={handleSearchChange}>
            </lightning-input>

            <lightning-dual-listbox
                name="tags"
                label="Tags"
                source-label="Available"
                selected-label="Selected"
                options={tagOptions}
                value={selectedTagValues}
                onchange={handleTagSelection}>
            </lightning-dual-listbox>
        </template>
    </section>
</template>
